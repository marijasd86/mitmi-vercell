  <div class="app-bar">
    <button class="btn btn-icon btn-ghost" onclick="navBack()" style="border-radius:8px">&larr;</button>
    <div class="app-bar-title">Prijave i bagovi</div>
    <button class="btn btn-ghost btn-sm" onclick="loadAdminModerationQueue()">Osveži</button>
  </div>
  <div class="admin-body">
    <div class="admin-nav-card">
      <button class="admin-nav-link" type="button" onclick="openAdminDrafts()">
        <span>Draftovi</span>
        <span class="tag tag-outline" id="admin-nav-drafts-count">0</span>
      </button>
      <button class="admin-nav-link" type="button" onclick="openOrganizerReview()">
        <span>Organizatori</span>
        <span class="tag tag-outline" id="admin-nav-organizers-count">0</span>
      </button>
      <button class="admin-nav-link active" type="button" onclick="openModerationInbox()">
        <span>Moderation</span>
        <span class="tag tag-outline" id="admin-nav-moderation-count">0</span>
      </button>
    </div>
    <div class="admin-grid">
      <div class="admin-stat"><div class="admin-stat-n" id="moderation-stat-open">0</div><div class="admin-stat-l">Otvoreno</div></div>
      <div class="admin-stat"><div class="admin-stat-n" id="moderation-stat-reviewing">0</div><div class="admin-stat-l">U obradi</div></div>
      <div class="admin-stat"><div class="admin-stat-n" id="moderation-stat-resolved">0</div><div class="admin-stat-l">Zatvoreno</div></div>
    </div>
    <div class="admin-panel">
      <div class="admin-panel-head">
        <div>
          <div class="admin-panel-title">Prijave i slučajevi</div>
          <div class="admin-panel-sub">Sve korisničke prijave i moderation item-i na jednom mestu.</div>
        </div>
        <span class="tag tag-outline" id="moderation-queue-badge">0 slučajeva</span>
      </div>
      <div class="admin-panel-body">
        <div class="admin-inline" style="margin-bottom:12px">
          <button class="btn btn-outline btn-sm" onclick="setModerationFilter('all')">Svi</button>
          <button class="btn btn-outline btn-sm" onclick="setModerationFilter('open')">Otvoreni</button>
          <button class="btn btn-outline btn-sm" onclick="setModerationFilter('reviewing')">U obradi</button>
        </div>
        <div class="admin-search-row" style="margin-bottom:12px">
	          <input class="form-input" type="text" id="admin-moderation-search" placeholder="Pretraži po razlogu, poruci, tipu ili autoru..." data-t-ph='{"sr":"Pretraži po razlogu, poruci, tipu ili autoru...","en":"Search by reason, message, type, or author..."}' oninput="renderAdminModerationInbox()">
        </div>
        <div class="draft-list" id="admin-moderation-list"></div>
      </div>
    </div>
  </div>
