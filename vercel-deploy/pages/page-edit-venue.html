  <div class="app-bar">

  <div class="set-body">
    <div class="set-section">
      <div class="set-section-lbl" data-t='{"sr":"OSNOVNO","en":"BASICS"}'>OSNOVNO</div>
      <div style="padding:14px 0 4px">
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Naziv organizatora","en":"Organizer name"}'>Naziv organizatora</label>
          <input class="form-input" type="text" id="edit-venue-name" placeholder="npr. Tvrdjava events" data-t-ph='{"sr":"npr. Tvrdjava events","en":"e.g. Fortress events"}'>
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Tip","en":"Type"}'>Tip</label>
                    <select class="form-select" id="edit-venue-type">
                      <option value="" data-t='{"sr":"Izaberi tip","en":"Choose type"}'>Izaberi tip</option>
                      <option data-t='{"sr":"Klub / bar","en":"Club / bar"}'>Klub / bar</option>
                      <option data-t='{"sr":"Kafana / etno bar","en":"Tavern / ethno bar"}'>Kafana / etno bar</option>
                      <option data-t='{"sr":"Restoran / kafić","en":"Restaurant / cafe"}'>Restoran / kafić</option>
                      <option data-t='{"sr":"Kulturni centar","en":"Cultural centre"}'>Kulturni centar</option>
                      <option data-t='{"sr":"Pozorište / bioskop","en":"Theatre / cinema"}'>Pozorište / bioskop</option>
                      <option data-t='{"sr":"Galerija / muzej","en":"Gallery / museum"}'>Galerija / muzej</option>
                      <option data-t='{"sr":"Sportski objekat","en":"Sports facility"}'>Sportski objekat</option>
                      <option data-t='{"sr":"Stadion / arena","en":"Stadium / arena"}'>Stadion / arena</option>
                      <option data-t='{"sr":"Festival / događaj","en":"Festival / event"}'>Festival / događaj</option>
                      <option data-t='{"sr":"Organizator događaja","en":"Event organiser"}'>Organizator događaja</option>
                      <option data-t='{"sr":"Udruženje / NGO","en":"Association / NGO"}'>Udruženje / NGO</option>
                      <option data-t='{"sr":"Zajednica / coworking","en":"Community / coworking"}'>Zajednica / coworking</option>
                      <option data-t='{"sr":"Ostalo","en":"Other"}'>Ostalo</option>
                    </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Grad","en":"City"}'>Grad</label>
          <input class="form-input form-input-city" id="edit-venue-city" list="sr-city-options" placeholder="Počni da kucaš grad" data-t-ph='{"sr":"Počni da kucaš grad","en":"Start typing your city"}'>
        </div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-section-lbl" data-t='{"sr":"OPIS","en":"DESCRIPTION"}'>OPIS</div>
      <div style="padding:14px 0 4px">
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Opis organizatora","en":"Organizer description"}'>Opis organizatora</label>
          <textarea class="form-textarea" id="edit-venue-description" placeholder="Opiši program, publiku i tip događaja koje organizuješ." data-t-ph='{"sr":"Opiši program, publiku i tip događaja koje organizuješ.","en":"Describe the program, audience, and type of events you organize."}'></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Javna adresa","en":"Public address"}'>Javna adresa</label>
          <input class="form-input" type="text" id="edit-venue-public-address" placeholder="npr. Cetinjska 15, Beograd" data-t-ph='{"sr":"npr. Cetinjska 15, Beograd","en":"e.g. Cetinjska 15, Belgrade"}'>
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Website","en":"Website"}'>Website</label>
          <input class="form-input" type="url" id="edit-venue-website" placeholder="https://...">

        <div class="form-group">

          <input class="form-input" type="text" id="edit-venue-instagram" placeholder="@nazivprofila">

        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Javni email","en":"Public email"}'>Javni email</label>
          <input class="form-input" type="email" id="edit-venue-public-email" placeholder="kontakt@primer.rs">
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Javni telefon","en":"Public phone"}'>Javni telefon</label>
          <input class="form-input" type="text" id="edit-venue-public-phone" placeholder="+381 ...">
        </div>
      </div>
    </div>
    <div style="padding:4px 0 20px">
      <button class="btn btn-purple btn-full" id="edit-venue-save-btn-bottom" onclick="saveEditedVenue()" data-t='{"sr":"Sačuvaj organizer profil","en":"Save organizer profile"}'>Sačuvaj organizer profil</button>
