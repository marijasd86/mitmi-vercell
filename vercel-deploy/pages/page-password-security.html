  <div class="app-bar">
    <button class="btn btn-icon btn-ghost" onclick="navBack()" style="border-radius:8px">←</button>
    <div class="app-bar-title" data-t='{"sr":"Lozinka i sigurnost","en":"Password & security"}'>Lozinka i sigurnost</div>
    <button class="btn btn-purple btn-sm" id="security-save-btn" onclick="updatePasswordSecurity()" data-t='{"sr":"Sačuvaj","en":"Save"}'>Sačuvaj</button>
  </div>
  <div class="set-body">
    <div class="set-section">
      <div class="set-section-lbl" data-t='{"sr":"NALOG","en":"ACCOUNT"}'>NALOG</div>
      <div style="padding:14px 0 4px">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="security-email" readonly>
          <div class="form-hint" data-t='{"sr":"Email menjaš kroz podršku dok ne povežemo kompletan auth flow.","en":"Email changes will be added later with the full auth flow."}'>Email menjaš kroz podršku dok ne povežemo kompletan auth flow.</div>
        </div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-section-lbl" data-t='{"sr":"PROMENA LOZINKE","en":"CHANGE PASSWORD"}'>PROMENA LOZINKE</div>
      <div style="padding:14px 0 4px">
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Nova lozinka","en":"New password"}'>Nova lozinka</label>
          <input class="form-input" type="password" id="security-new-password" placeholder="minimum 8 karaktera">
        </div>
        <div class="form-group">
          <label class="form-label" data-t='{"sr":"Potvrdi lozinku","en":"Confirm password"}'>Potvrdi lozinku</label>
          <input class="form-input" type="password" id="security-confirm-password" placeholder="ponovi novu lozinku">
        </div>
        <div class="form-hint" data-t='{"sr":"Koristi jedinstvenu lozinku koju ne koristiš na drugim sajtovima.","en":"Use a unique password you don't use on other sites."}'>Koristi jedinstvenu lozinku koju ne koristiš na drugim sajtovima.</div>
      </div>
    </div>
    <div style="padding:4px 0 20px">
      <button class="btn btn-purple btn-full" onclick="updatePasswordSecurity()" data-t='{"sr":"Sačuvaj lozinku","en":"Save password"}'>Sačuvaj lozinku</button>
    </div>
  </div>
