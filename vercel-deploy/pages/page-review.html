  <div class="app-bar">
    <button class="btn btn-icon btn-ghost" onclick="navBack()" style="border-radius:8px">←</button>
    <div class="app-bar-title">Oceni iskustvo</div>
  </div>
  <div style="padding:20px 16px 120px">
    <div id="review-empty" class="draft-empty">Još nema iskustava koja čekaju ocenu.</div>
    <div id="review-shell" style="display:none">
      <div id="review-queue-card" class="card" style="display:none;padding:14px 14px 10px;margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <div>
            <div style="font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--ink)">Čeka tvoju ocenu</div>
            <div id="review-queue-copy" style="font-size:12px;color:var(--ink3);margin-top:3px">Izaberi iskustvo koje želiš da oceniš.</div>
          </div>
          <span class="tag tag-purple" id="review-queue-count">0</span>
        </div>
        <div id="review-queue-list" class="pills"></div>
      </div>

      <div class="card" style="padding:16px 16px 14px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-bottom:8px" id="review-kind">Ocena</div>
        <div style="font-size:24px;font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:6px" id="review-title">Kako je prošlo?</div>
        <div style="font-size:13px;color:var(--ink3);line-height:1.6" id="review-subtitle">Podeli kratak utisak da pomogneš zajednici.</div>
      </div>

      <div id="review-peer-fields" class="card" style="display:none;padding:16px;gap:14px">
        <div class="form-group">
          <label class="form-label">Da li se osoba pojavila?</label>
          <select class="form-select" id="review-peer-show">
            <option value="yes">Da</option>
            <option value="no">Ne</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Komunikacija</label>
          <select class="form-select" id="review-peer-communication">
            <option value="5">5 - Odlično</option>
            <option value="4">4 - Vrlo dobro</option>
            <option value="3">3 - Korektno</option>
            <option value="2">2 - Slabo</option>
            <option value="1">1 - Loše</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Da li bi opet išla/o sa ovom osobom?</label>
          <select class="form-select" id="review-peer-again">
            <option value="yes">Da</option>
            <option value="no">Ne</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Kratak komentar</label>
          <textarea class="form-textarea" id="review-peer-comment" placeholder="Opciono"></textarea>
        </div>
      </div>

      <div id="review-event-fields" class="card" style="display:none;padding:16px;gap:14px">
        <div class="form-group">
          <label class="form-label">Opšti utisak</label>
          <select class="form-select" id="review-event-overall">
            <option value="5">5 - Odlično</option>
            <option value="4">4 - Vrlo dobro</option>
            <option value="3">3 - Dobro</option>
            <option value="2">2 - Slabo</option>
            <option value="1">1 - Loše</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Atmosfera</label>
          <select class="form-select" id="review-event-atmosphere">
            <option value="">Preskoči</option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Organizacija</label>
          <select class="form-select" id="review-event-organization">
            <option value="">Preskoči</option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Kratak komentar</label>
          <textarea class="form-textarea" id="review-event-comment" placeholder="Opciono"></textarea>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-outline" onclick="skipActiveReviewTask()">Preskoči</button>
        <button class="btn btn-purple" id="review-submit-btn" onclick="submitActiveReviewTask()">Sačuvaj ocenu</button>
      </div>
    </div>
  </div>
